name: LostFindings CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===== JOB 1: Lint & Type Check =====
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  # ===== JOB 2: Test =====
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    environment: development
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      APP_ENV: ${{ vars.APP_ENV }}
      APP_NAME: ${{ vars.APP_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Run tests
        run: |
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npm test -- --passWithNoTests --watchAll=false
          else
            echo "No test config found, skipping tests"
          fi
        env:
          CI: true

  # ===== JOB 3: Docker Staging (develop branch) =====
  docker-staging:
    name: Docker Build - Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lostfindings:staging
          build-args: |
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
            APP_ENV=${{ vars.APP_ENV }}
            APP_NAME=${{ vars.APP_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== JOB 4: Docker Production (main branch) =====
  docker-production:
    name: Docker Build - Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lostfindings:latest
            ${{ secrets.DOCKER_USERNAME }}/lostfindings:${{ github.sha }}
          build-args: |
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
            APP_ENV=${{ vars.APP_ENV }}
            APP_NAME=${{ vars.APP_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max